<!DOCTYPE html>
<html lang="fr">
<head>

  <title>Transcript révoqué — SmartFuture</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;

    }
    .card {
      background: #fff;

      background: #fee2e2;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
    }
    .icon-wrap svg { width: 38px; height: 38px; color: #ef4444; }
    h1 { font-size: 22px; font-weight: 700; color: #0f172a; margin-bottom: 12px; }
    p  { font-size: 15px; color: #64748b; line-height: 1.6; margin-bottom: 8px; }
    .badge {
      display: inline-block;
      background: #fee2e2; color: #b91c1c;
      font-size: 12px; font-weight: 700;
      padding: 4px 14px; border-radius: 99px;
      margin-bottom: 28px;
      letter-spacing: .5px;
    }
    .footer { margin-top: 36px; font-size: 13px; color: #94a3b8; }
    .footer a { color: #3b82f6; text-decoration: none; font-weight: 600; }
  </style>
</head>

  <div class="card">

      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">

    <div class="footer">
      Plateforme <a href="https://smartfuture.tn">SmartFuture</a>
    </div>
  </div>

</html>
